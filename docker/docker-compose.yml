services:
  postgres:
    image: postgres:16-alpine
    container_name: surgepay-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - surgepay-network

  redis:
    image: redis:7-alpine
    container_name: surgepay-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - surgepay-network

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.10
    container_name: surgepay-redpanda
    restart: unless-stopped
    command: >
      redpanda start
      --smp 1
      --memory 1G
      --overprovisioned
      --node-id 0
      --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:29092
      --advertise-kafka-addr internal://redpanda:9092,external://localhost:29092
      --pandaproxy-addr 0.0.0.0:8082
      --advertise-pandaproxy-addr localhost:8082
      --rpc-addr 0.0.0.0:33145
      --advertise-rpc-addr redpanda:33145
    ports:
      - "${REDPANDA_PORT:-9092}:9092"
      - "29092:29092"
      - "${REDPANDA_ADMIN_PORT:-9644}:9644"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster info || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - surgepay-network

  redpanda-bootstrap:
    image: docker.redpanda.com/redpandadata/redpanda:v23.3.10
    container_name: surgepay-redpanda-bootstrap
    entrypoint: ["/bin/bash", "/opt/redpanda/bootstrap.sh"]
    volumes:
      - ./redpanda/bootstrap.sh:/opt/redpanda/bootstrap.sh
      - ./redpanda/create-topics.sh:/opt/redpanda/create-topics.sh
    depends_on:
      redpanda:
        condition: service_healthy
    networks:
      - surgepay-network

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: surgepay-kafka-ui
    restart: unless-stopped
    ports:
      - "${KAFKA_UI_PORT:-8080}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: surgepay-redpanda
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: redpanda:9092
      DYNAMIC_CONFIG_ENABLED: "true"
    depends_on:
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - surgepay-network

  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: surgepay-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - surgepay-network

  grafana:
    image: grafana/grafana:10.4.2
    container_name: surgepay-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GF_SECURITY_ADMIN_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD}
      - GRAFANA_ADMIN_USER=${GRAFANA_ADMIN_USER}
      - GRAFANA_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - ./grafana/grafana.ini:/etc/grafana/grafana.ini
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - surgepay-network

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.95.0
    container_name: surgepay-otel-collector
    restart: unless-stopped
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml
    healthcheck:
      test: ["CMD", "/otelcol-contrib", "validate", "--config=/etc/otelcol-contrib/config.yaml"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - surgepay-network

networks:
  surgepay-network:
    name: surgepay-network
    driver: bridge

volumes:
  postgres-data:
    name: postgres-data
  redis-data:
    name: redis-data
  redpanda-data:
    name: redpanda-data
  grafana-data:
    name: grafana-data
