global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "rules/*.yml"

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "otel-collector"
    static_configs:
      - targets: ["surgepay-otel-collector:8889"]

  - job_name: "order-service"
    static_configs:
      - targets: ["host.docker.internal:3004"]

  - job_name: "outbox-relay"
    static_configs:
      - targets: ["host.docker.internal:9091"]

  - job_name: "redpanda"
    metrics_path: "/public_metrics"
    static_configs:
      - targets: ["redpanda:9644"]
